<!DOCTYPE html>
<html>
<head>
    <title>Contact Us Form</title>
    
    <script src="JS/Script.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

        <h2>Contact Us</h2>
        <div class="formm">
        <form action="" onsubmit="return collect_data()">
            <table>
                <tr>
                    <td><label for="name1">First name:</label><br>
                    <input type="text" id="name1" name="name1">
                </td>
                <td>   
                
                    <label for="name2">Last name:</label><br>
                    <input type="text" id="name2" name="name2"></td>
                
                </tr>
                
                
                <tr>
                    <td>
                    <label for="email">Email:</label><br>
                    <input type="email" id="email" name="email">
                    </td>
                    <td>
                    <label for="phone">Phone Number:</label><br>
                    <input type="tel" id="phone" name="phone">
                
                </td>
                </tr>
               
               
                <tr>
                    <td>
                    <label for="message">What do you have in mind</label><br>
                    <textarea id="message" name="message" required></textarea>
                </td>
                </tr>
                
                
                <tr>

                    <td colspan="2">
                        <input type="submit" value="Submit">
                    </td>
                </tr>

            </table>

            </div>
        </form>

</body>
</html>
